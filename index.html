<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIJU BEATS | Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=99"> </head>
<body>
    <div class="bg-glow"></div>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <span class="logo-main">KAIJU</span><span class="logo-accent">BEATS</span>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-link" id="contactBtn">CONTACT</a>
                <button class="cart-btn" id="cartBtn">
                    <i class="fas fa-shopping-cart"></i> <span id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="promo-banner">🔥 2 BEATS ACHETÉS = LE 3ÈME OFFERT 🔥</div>

    <header class="hero">
        <div class="container">
            <h1 class="glitch">KAIJU ON THE BEAT</h1>
            <p class="hero-sub">DAKAR PREMIUM SOUNDS 🇸🇳</p>
        </div>
    </header>

    <section id="beats" class="catalog-section">
        <div class="container">
            <div class="section-header">
                <h2 style="font-family:'Orbitron'; margin-bottom:20px; text-align:center;">Écoute, et fais ton choix ! (<span id="beatsCount">0</span>)</h2>
                <div class="filter-container">
                    <input type="text" id="searchInput" placeholder="Rechercher...">
                    <select id="genreFilter">
                        <option value="all">TOUS LES GENRES</option>
                        <option value="trap">TRAP</option>
                        <option value="hood-trap">HOOD-TRAP</option>
                        <option value="afro">AFRO</option>
                        <option value="drill">DRILL</option>
                    </select>
                </div>
            </div>
            <div class="beats-grid" id="beatsGrid"></div>
        </div>
    </section>

    <div id="contactModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>KAIJU CONNECT</h3>
                <button id="contactClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="contact-options">
                <a href="https://instagram.com/its._kaiju" target="_blank" class="contact-card">
                    <i class="fab fa-instagram"></i> @its._kaiju
                </a>
                <a href="mailto:callmekaiju@gmail.com" class="contact-card">
                    <i class="fas fa-envelope"></i> callmekaiju@gmail.com
                </a>
            </div>
        </div>
    </div>

  <div class="audio-player" id="audioPlayer" style="display: none;">
    <div class="container player-inner">
        <img src="" id="playerImage" class="p-img">
        <div class="p-info">
            <h4 id="playerTitle" style="font-size: 0.8rem; font-family: 'Orbitron';">Titre</h4>
        </div>
        
        <div class="p-controls-master">
            <div class="p-buttons">
                <button onclick="skipTime(-10)" class="skip-btn"><i class="fas fa-backward"></i></button>
                <button id="playPauseBtn" class="main-play"><i class="fas fa-play"></i></button>
                <button onclick="skipTime(10)" class="skip-btn"><i class="fas fa-forward"></i></button>
            </div>
            
            <div class="p-progress-container">
                <span id="currentTime" class="time-display">0:00</span>
                <input type="range" id="progressBar" value="0" max="100" class="custom-slider">
                <span id="durationTime" class="time-display">0:00</span>
            </div>
        </div>

        <div class="volume-container">
            <button id="muteBtn" class="volume-btn"><i class="fas fa-volume-up"></i></button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" class="vol-slider">
        </div>

        <button id="playerClose" class="p-close-btn"><i class="fas fa-times"></i></button>
    </div>
    <audio id="mainAudio"></audio>
</div>

        <button id="playerClose" class="p-close-btn"><i class="fas fa-times"></i></button>
    </div>
    <audio id="mainAudio"></audio>
</div>

    <script src="script.js?v=99"></script>
</body>
</html>
