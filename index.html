<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIJU BEATS | High-End Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=10.0">
</head>
<body>
    <div class="bg-glow"></div>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <span class="logo-main">KAIJU</span><span class="logo-accent">BEATS</span>
            </div>
            <div class="nav-right">
                <button class="nav-link-btn" id="contactBtn">CONTACT</button>
                <button class="cart-trigger" id="cartBtn">
                    <i class="fas fa-shopping-bag"></i> <span id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="promo-container">
        <div class="promo-bar">🔥 2 BEATS ACHETÉS = LE 3ÈME OFFERT (AUTO-APPLIQUÉ) 🔥</div>
    </div>

    <main class="container">
        <div class="catalog-header">
            <h1>STUDIO CATALOG</h1>
            <div class="filter-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Rechercher...">
                </div>
                <select id="genreFilter">
                    <option value="all">TOUS LES STYLES</option>
                    <option value="trap">TRAP</option>
                    <option value="hood-trap">HOOD-TRAP</option>
                    <option value="afro">AFRO</option>
                    <option value="Oriental">ORIENTAL</option>
                    <option value="Drill">DRILL</option>
                    <option value="Jersey">JERSEY</option>
                    <option value="Boom bap">BOOM BAP</option>   
                    <option value="Amapiano">AMAPIANO</option>                 
                </select>
            </div>
        </div>
        <div class="beats-grid" id="beatsGrid"></div>
    </main>

    <div id="contactModal" class="modal">
        <div class="modal-card">
            <button class="close-btn" id="closeContact">&times;</button>
            <h2>CONNECT WITH KAIJU</h2>
            <div class="contact-list">
                <a href="https://wa.me/221777694864" target="_blank" class="c-item">
                    <i class="fab fa-whatsapp"></i>
                    <div class="c-txt"><span>WhatsApp</span><small>Direct Line</small></div>
                </a>
                <a href="mailto:callmekaiju@gmail.com" class="c-item">
                    <i class="fas fa-envelope"></i>
                    <div class="c-txt"><span>Email</span><small>callmekaiju@gmail.com</small></div>
                </a>
                <a href="https://instagram.com/its._kaiju" target="_blank" class="c-item">
                    <i class="fab fa-instagram"></i>
                    <div class="c-txt"><span>Instagram</span><small>@its._kaiju</small></div>
                </a>
            </div>
        </div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-card">
            <button class="close-btn" id="closeCart">&times;</button>
            <h2 class="cart-title">VOTRE PANIER</h2>
            <div id="cartItems" class="cart-scroll"></div>
            <div id="cartTotalArea"></div>
        </div>
    </div>

    <div class="player-fixed" id="audioPlayer">
        <div class="container player-grid">
            <div class="p-info">
                <img src="" id="pCover">
                <div class="p-meta">
                    <h4 id="pTitle">Titre</h4>
                    <small class="logo-accent">PROD BY KAIJU</small>
                </div>
            </div>
            <div class="p-controls">
                <div class="p-buttons">
                    <button onclick="changeTime(-10)" class="skip-btn"><i class="fas fa-backward"></i></button>
                    <button id="pPlayPause" class="play-main-btn"><i class="fas fa-play"></i></button>
                    <button onclick="changeTime(10)" class="skip-btn"><i class="fas fa-forward"></i></button>
                </div>
                <div class="p-seeker">
                    <span id="timeCurrent">0:00</span>
                    <input type="range" id="pProgress" value="0" max="100" step="0.1">
                    <span id="timeTotal">0:00</span>
                </div>
            </div>
            <div class="p-vol">
                <i class="fas fa-volume-up"></i>
                <input type="range" id="volControl" min="0" max="1" step="0.1" value="1">
            </div>
        </div>
        <audio id="mainAudio"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
