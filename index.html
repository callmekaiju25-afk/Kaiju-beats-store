<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIJU BEATS | Premium Producer Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=5.0">
</head>
<body>
    <div class="bg-glow"></div>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <span class="logo-main">KAIJU</span><span class="logo-accent">BEATS</span>
            </div>
            <div class="nav-right">
                <a href="#" class="nav-link" id="contactBtn">CONTACT</a>
                <button class="cart-trigger" id="cartBtn">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="promo-bar">
        <div class="promo-content">
            <span>🔥 OFFRE : 2 BEATS ACHETÉS = LE 3ÈME OFFERT 🔥</span>
        </div>
    </div>

    <main class="container">
        <header class="catalog-header">
            <h1>PREMIUM CATALOGUE</h1>
            <div class="controls-row">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Rechercher un beat...">
                </div>
                <div class="filter-wrapper">
                    <select id="genreFilter">
                        <option value="all">TOUS LES STYLES</option>
                        <option value="trap">TRAP</option>
                        <option value="hood-trap">HOOD-TRAP</option>
                        <option value="afro">AFRO</option>
                        <option value="drill">DRILL</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="beats-grid" id="beatsGrid">
            </div>
    </main>

    <div id="contactModal" class="modal">
        <div class="modal-card">
            <button class="close-modal" id="contactClose">&times;</button>
            <h2>GET IN TOUCH</h2>
            <div class="contact-links">
                <a href="https://wa.me/221777694864" target="_blank" class="c-link">
                    <i class="fab fa-whatsapp"></i>
                    <div class="c-info"><span>WhatsApp</span><p>+221 77 769 48 64</p></div>
                </a>
                <a href="mailto:callmekaiju@gmail.com" class="c-link">
                    <i class="fas fa-envelope"></i>
                    <div class="c-info"><span>Email</span><p>callmekaiju@gmail.com</p></div>
                </a>
                <a href="https://instagram.com/its._kaiju" target="_blank" class="c-link">
                    <i class="fab fa-instagram"></i>
                    <div class="c-info"><span>Instagram</span><p>@its._kaiju</p></div>
                </a>
            </div>
        </div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-card">
            <button class="close-modal" id="cartClose">&times;</button>
            <h2>VOTRE PANIER</h2>
            <div id="cartItems" class="cart-list"></div>
            <div id="cartSummary" class="cart-footer">
                </div>
        </div>
    </div>

    <div class="player-bar" id="audioPlayer" style="display: none;">
        <div class="container player-flex">
            <div class="p-now-playing">
                <img src="" id="playerImage">
                <div class="p-txt">
                    <h4 id="playerTitle">Titre</h4>
                    <span class="logo-accent">KAIJU</span>
                </div>
            </div>
            
            <div class="p-main-ctrl">
                <div class="p-btns">
                    <button onclick="changeTime(-10)" class="p-skip"><i class="fas fa-undo"></i></button>
                    <button id="playPauseBtn" class="p-play-main"><i class="fas fa-play"></i></button>
                    <button onclick="changeTime(10)" class="p-skip"><i class="fas fa-redo"></i></button>
                </div>
                <div class="p-progress-area">
                    <span id="currentTime">0:00</span>
                    <input type="range" id="progressBar" value="0" max="100">
                    <span id="durationTime">0:00</span>
                </div>
            </div>

            <div class="p-volume">
                <button id="muteBtn"><i class="fas fa-volume-up"></i></button>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
            </div>
        </div>
        <audio id="mainAudio"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
