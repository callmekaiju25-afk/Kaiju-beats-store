<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIJU BEATS | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">KAIJU<span class="logo-glow">BEATS</span></div>
            <div class="nav-menu">
                <a href="#" class="nav-link" id="contactBtn">CONTACT</a>
                <button class="cart-btn" id="cartBtn">
                    <i class="fas fa-shopping-cart"></i> <span id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="glitch">KAIJU ON THE BEAT</h1>
            <p class="hero-sub">Là où les hits prennent vie</p>
        </div>
    </header>

    <section id="beats" class="catalog-section">
        <div class="container">
            <div class="section-header">
                <h2>CATALOGUE (<span id="beatsCount">0</span>)</h2>
                <div class="filter-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Chercher un titre...">
                    </div>
                </div>
            </div>
            <div class="beats-grid" id="beatsGrid"></div>
        </div>
    </section>

    <div id="contactModal" class="modal">
        <div class="modal-content contact-popup">
            <div class="modal-header">
                <h3>KAIJU CONNECT 🇸🇳</h3>
                <button id="contactClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="contact-options">
                <a href="https://instagram.com/kaiju_beats" target="_blank" class="contact-card insta">
                    <i class="fab fa-instagram"></i>
                    <div class="contact-text">
                        <span>INSTAGRAM</span>
                        <p>@kaiju_beats</p>
                    </div>
                </a>
                <a href="mailto:contact@kaijubeats.com" class="contact-card mail">
                    <i class="fas fa-envelope"></i>
                    <div class="contact-text">
                        <span>EMAIL</span>
                        <p>contact@kaijubeats.com</p>
                    </div>
                </a>
                <a href="https://wa.me/221777694864" target="_blank" class="contact-card whatsapp">
                    <i class="fab fa-whatsapp"></i>
                    <div class="contact-text">
                        <span>WHATSAPP</span>
                        <p>+221 77 769 48 64</p>
                    </div>
                </a>
            </div>
            <div class="flag-footer">🇸🇳 DAKAR, SENEGAL 🇸🇳</div>
        </div>
    </div>

    <div id="toast" class="toast">Ajouté au panier !</div>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>VOTRE PANIER</h3>
                <button id="cartCloseBtn"><i class="fas fa-times"></i></button>
            </div>
            <div id="cartBody" class="modal-body"></div>
            <div id="cartFooter" class="modal-footer" style="display: none;">
                <div id="cartTotalDisplay"></div>
                <button id="checkoutWhatsapp" class="btn-checkout">
                    <i class="fab fa-whatsapp"></i> COMMANDER SUR WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <div class="audio-player" id="audioPlayer" style="display: none;">
        <div class="container player-inner">
            <img src="" id="playerImage" class="p-img">
            <div class="p-info">
                <h4 id="playerTitle">Titre</h4>
                <p id="playerGenre">Genre</p>
            </div>
            <div class="p-controls">
                <div class="p-btns">
                    <button id="restartBtn" class="sub-ctrl"><i class="fas fa-undo"></i></button>
                    <button id="playPauseBtn" class="main-play"><i class="fas fa-play"></i></button>
                    <button id="forwardBtn" class="sub-ctrl"><i class="fas fa-forward"></i></button>
                </div>
                <div class="p-progress">
                    <span id="currentTime">0:00</span>
                    <input type="range" id="progressBar" value="0" max="100">
                    <span id="durationTime">0:00</span>
                </div>
            </div>
            <button id="playerClose" class="p-close"><i class="fas fa-times"></i></button>
        </div>
        <audio id="mainAudio"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
