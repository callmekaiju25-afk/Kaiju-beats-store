<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kaiju Beats Store - Beats premium par Kaiju.">
    <title>Kaiju Beats Store | Premium Beats</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">KAIJU<span class="logo-accent">BEATS</span></div>
            <div class="nav-menu">
                <a href="#beats" class="nav-link">Beats</a>
                <button class="cart-btn" id="cartBtn">
                    <i class="fas fa-shopping-cart"></i> <span id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1 class="hero-title">PREMIUM <span class="title-main">BEATS</span></h1>
            <p class="hero-subtitle">Production Pro • 39.99€ / Beat • Livraison Instantanée</p>
            <a href="#beats" class="btn-primary" style="padding: 15px 30px; text-decoration: none; display: inline-block; margin-top: 20px;">EXPLORER</a>
        </div>
    </section>

    <section class="search-section" id="beats">
        <div class="container">
            <div class="search-filter-wrapper">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Rechercher un beat...">
                </div>
                <div class="filters">
                    <select id="genreFilter">
                        <option value="all">Tous les styles</option>
                        <option value="drill">Drill</option>
                        <option value="trap">Trap</option>
                        <option value="afro">Afro</option>
                        <option value="hood-trap">Hood-trap</option>
                        <option value="oriental">Oriental</option>
                        <option value="boom-bap">Boom Bap</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <section class="beats-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Catalogue (<span id="beatsCount">0</span>)</h2>
            </div>
            <div class="beats-grid" id="beatsGrid">
                </div>
        </div>
    </section>

    <footer class="footer" id="contact">
        <div class="container">
            <div class="footer-content">
                <div>
                    <h3>KAIJU BEATS</h3>
                    <p>Contact pro : <a href="mailto:callmekaiju25@gmail.com" style="color:var(--primary)">callmekaiju25@gmail.com</a></p>
                </div>
                <div class="social-links">
                    <a href="https://instagram.com/its._kaiju" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://wa.me/221777694864" target="_blank"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <p style="text-align:center; margin-top:40px;">&copy; 2026 KAIJU BEATS STORE</p>
        </div>
    </footer>

    <div class="audio-player" id="audioPlayer" style="display: none;">
        <div class="container audio-player-content">
            <img src="" id="playerImage" class="player-image">
            <div class="audio-details">
                <h4 id="playerTitle">Titre</h4>
                <p id="playerGenre">Genre</p>
            </div>
            <button class="player-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
            <audio id="mainAudio" src=""></audio>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
