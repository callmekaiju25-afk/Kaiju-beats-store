<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIJU BEATS | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=20">
</head>
<body>
    <div class="bg-glow"></div>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <span class="logo-main">KAIJU</span><span class="logo-accent">BEATS</span>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-link" id="contactBtn">CONTACT</a>
                <button class="cart-btn" id="cartBtn">
                    <i class="fas fa-shopping-cart"></i> <span id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="promo-banner">
        🔥 OFFRE SPÉCIALE : 2 BEATS ACHETÉS = LE 3ÈME OFFERT 🔥
    </div>

    <header class="hero">
        <div class="container">
            <h1 class="glitch">KAIJU ON THE BEAT</h1>
            <p class="hero-sub">DAKAR PREMIUM SOUNDS 🇸🇳</p>
        </div>
    </header>

    <section id="beats" class="catalog-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Écoute, et fais ton choix ! (<span id="beatsCount">0</span>)</h2>
                
                <div class="filter-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Chercher un titre...">
                    </div>
                    <select id="genreFilter">
                        <option value="all">TOUS LES GENRES</option>
                        <option value="trap">TRAP</option>
                        <option value="hood-trap">HOOD-TRAP</option>
                        <option value="afro">AFRO</option>
                        <option value="drill">DRILL</option>
                        <option value="oriental">ORIENTAL</option>
                    </select>
                </div>
            </div>
            <div class="beats-grid" id="beatsGrid"></div>
        </div>
    </section>

    <div id="contactModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>KAIJU CONNECT 🇸🇳</h3>
                <button id="contactClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="contact-options">
                <a href="https://instagram.com/its._kaiju" target="_blank" class="contact-card">
                    <i class="fab fa-instagram"></i>
                    <div class="contact-text"><span>INSTAGRAM</span><p>@its._kaiju</p></div>
                </a>
                <a href="mailto:callmekaiju@gmail.com" class="contact-card">
                    <i class="fas fa-envelope"></i>
                    <div class="contact-text"><span>EMAIL</span><p>callmekaiju@gmail.com</p></div>
                </a>
                <a href="https://wa.me/221777694864" target="_blank" class="contact-card">
                    <i class="fab fa-whatsapp"></i>
                    <div class="contact-text"><span>WHATSAPP</span><p>+221 77 769 48 64</p></div>
                </a>
            </div>
        </div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>VOTRE PANIER</h3>
                <button id="cartCloseBtn"><i class="fas fa-times"></i></button>
            </div>
            <div id="cartBody" class="modal-body"></div>
            <div id="cartFooter" class="modal-footer" style="display: none;">
                <div id="cartTotalDisplay"></div>
                <button id="checkoutWhatsapp" class="btn-checkout">
                    COMMANDER VIA WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <div class="audio-player" id="audioPlayer" style="display: none;">
        <div class="container player-inner">
            <img src="" id="playerImage" class="p-img">
            <div class="p-info">
                <h4 id="playerTitle">Titre</h4>
            </div>
            <div class="p-controls">
                <button id="playPauseBtn" class="main-play"><i class="fas fa-play"></i></button>
                <div class="p-progress-area">
                    <span id="currentTime">0:00</span>
                    <input type="range" id="progressBar" value="0" max="100">
                    <span id="durationTime">0:00</span>
                </div>
            </div>
            <button id="playerClose" class="p-close-btn"><i class="fas fa-times"></i></button>
        </div>
        <audio id="mainAudio"></audio>
    </div>

    <div id="toast" class="toast">Ajouté !</div>
    <script src="script.js"></script>
</body>
</html>
