<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIJU BEATS | Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=11.0">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        .checkout-page { min-height: 100vh; padding: 120px 20px 100px; }
        .checkout-wrapper { max-width: 960px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .checkout-card { background: var(--card); border: 1px solid var(--border-light); border-radius: 20px; padding: 30px; }
        .checkout-card h2 { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 900; letter-spacing: 3px; color: var(--primary); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; }
        .form-group input { width: 100%; background: rgba(0,255,136,0.03); border: 1px solid var(--border-light); border-radius: 10px; padding: 14px 18px; color: var(--text-primary); font-family: 'Space Mono', monospace; font-size: 0.85rem; outline: none; transition: all 0.3s ease; box-sizing: border-box; }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,255,136,0.15); }
        .form-group input::placeholder { color: #444; }
        .checkout-right { display: flex; flex-direction: column; gap: 24px; }
        .recap-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
        .recap-item:last-child { border-bottom: none; }
        .recap-cover { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .recap-info { flex: 1; }
        .recap-info h4 { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
        .recap-info small { font-size: 0.65rem; color: var(--text-secondary); letter-spacing: 1px; }
        .recap-price { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--primary); white-space: nowrap; }
        .recap-free { color: #00ff88; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; }
        .total-section { border-top: 1px solid rgba(0,255,136,0.2); padding-top: 18px; margin-top: 8px; }
        .total-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .total-line.main { margin-top: 12px; }
        .total-line.main span:first-child { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900; color: var(--text-primary); letter-spacing: 2px; }
        .total-line.main span:last-child { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 900; color: var(--primary); text-shadow: 0 0 20px rgba(0,255,136,0.4); }
        .promo-line { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2); border-radius: 8px; padding: 10px 14px; font-size: 0.7rem; color: var(--primary); text-align: center; letter-spacing: 1px; margin-bottom: 10px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 2px; text-decoration: none; margin-bottom: 30px; transition: color 0.3s; }
        .back-btn:hover { color: var(--primary); }
        .empty-cart { text-align: center; padding: 60px 20px; }
        .empty-cart i { font-size: 3rem; color: #333; margin-bottom: 20px; display: block; }
        .empty-cart h2 { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--text-secondary); letter-spacing: 3px; }
        .success-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .success-overlay.show { display: flex; }
        .success-card { background: #0d0d0d; border: 1px solid rgba(0,255,136,0.3); border-radius: 24px; padding: 50px 40px; text-align: center; max-width: 480px; width: 100%; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .success-icon { font-size: 4rem; margin-bottom: 20px; }
        .success-card h2 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: var(--primary); margin-bottom: 14px; }
        .success-card p { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: #aaa; line-height: 1.9; }
        .success-card .go-back { display: inline-block; margin-top: 24px; padding: 14px 30px; background: var(--primary); color: black; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 2px; border-radius: 10px; text-decoration: none; transition: all 0.3s; }
        .success-card .go-back:hover { box-shadow: 0 0 25px rgba(0,255,136,0.5); transform: translateY(-2px); }
        .paypalme-btn { width: 100%; padding: 16px; background: #0070ba; border: none; border-radius: 12px; color: white; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .paypalme-btn:hover { background: #005ea6; box-shadow: 0 0 25px rgba(0,112,186,0.5); transform: translateY(-2px); }
        .confirm-btn { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: black; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 12px; }
        .confirm-btn:hover { box-shadow: 0 0 25px rgba(0,255,136,0.5); transform: translateY(-2px); }
        .tx-box { background: rgba(0,255,136,0.04); border: 1px solid rgba(0,255,136,0.15); border-radius: 14px; padding: 20px; margin-top: 16px; display: none; }
        .tx-label { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--primary); letter-spacing: 2px; margin-bottom: 8px; }
        .tx-desc { font-family: 'Space Mono', monospace; font-size: 0.67rem; color: #777; line-height: 1.7; margin-bottom: 14px; }
        .tx-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(0,255,136,0.25); border-radius: 10px; padding: 13px 16px; color: #fff; font-family: 'Space Mono', monospace; font-size: 0.82rem; outline: none; box-sizing: border-box; margin-bottom: 4px; transition: border-color 0.3s; }
        .tx-input:focus { border-color: var(--primary); }
        .tx-error { font-size: 0.63rem; color: #ff4455; font-family: 'Space Mono', monospace; margin: 6px 0 0; display: none; }
        .pending-box { background: rgba(255,200,0,0.05); border: 1px solid rgba(255,200,0,0.2); border-radius: 12px; padding: 16px; margin-top: 14px; display: none; }
        .pending-box p { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: #ffcc00; line-height: 1.8; }
        @media (max-width: 768px) { .checkout-wrapper { grid-template-columns: 1fr; } .checkout-right { order: -1; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="grid-overlay"></div>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo" style="text-decoration:none">
                <div class="logo-wrapper"><img src="Logo.PNG" alt="KAIJU BEATS" class="logo-img"></div>
                <div class="logo-underline"></div>
            </a>
        </div>
    </nav>

    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <div class="success-icon">🎵</div>
            <h2 id="successTitle">PAIEMENT EN COURS DE VÉRIFICATION</h2>
            <p id="successMsg"></p>
            <a href="index.html" class="go-back" id="successBtn">RETOUR AU CATALOGUE</a>
        </div>
    </div>

    <main class="checkout-page container">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> <span id="backLabel">RETOUR AU CATALOGUE</span>
        </a>

        <div id="emptyCart" class="empty-cart" style="display:none">
            <i class="fas fa-shopping-bag"></i>
            <h2 id="emptyMsg">TON PANIER EST VIDE</h2>
            <a href="index.html" class="back-btn" style="justify-content:center; margin-top:20px;">
                <i class="fas fa-arrow-left"></i> RETOUR AU CATALOGUE
            </a>
        </div>

        <div class="checkout-wrapper" id="checkoutWrapper">
            <div class="checkout-left">
                <div class="checkout-card">
                    <h2><i class="fas fa-user"></i> <span id="formTitle">TES INFORMATIONS</span></h2>
                    <div class="form-group">
                        <label id="labelName">TON PRÉNOM</label>
                        <input type="text" id="custName" placeholder="Ex: Lenzo">
                    </div>
                    <div class="form-group">
                        <label id="labelEmail">TON EMAIL</label>
                        <input type="email" id="custEmail" placeholder="Ex: lenzo@gmail.com">
                    </div>
                    <p style="font-size:0.63rem; color:#444; font-family:'Space Mono',monospace; line-height:1.6;" id="emailNote"></p>
                </div>

                <div class="checkout-card">
                    <h2><i class="fas fa-credit-card"></i> <span id="payTitle">PAIEMENT SÉCURISÉ</span></h2>
                    <div id="payContainer"></div>
                </div>
            </div>

            <div class="checkout-right">
                <div class="checkout-card">
                    <h2><i class="fas fa-shopping-bag"></i> <span id="recapTitle">RÉCAP DE COMMANDE</span></h2>
                    <div id="recapItems"></div>
                    <div class="total-section">
                        <div id="promoLine"></div>
                        <div class="total-line main">
                            <span>TOTAL</span>
                            <span id="recapTotal">0€</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    const EMAILJS_PUBLIC_KEY  = '7E6XV-vYEiZ0_WpyD';
    const EMAILJS_SERVICE_ID  = 'service_j2kw8w9';
    const EMAILJS_TEMPLATE_FR = 'template_rbznd3c';
    const EMAILJS_TEMPLATE_EN = 'template_ekgt4yq';
    const PAYPALME_LINK       = 'https://paypal.me/ItsKaiju09';
    const KAIJU_WA            = '221777694864';

    const driveLinks = {
        'ANUBIS':        'https://drive.google.com/file/d/1JYRJo2K1-ySQAh664mjrXrbLi6dUNyM9/view',
        'Aurore':        'https://drive.google.com/file/d/1jjTBGBzLyFbukDTbX9L_qhIysr_hRDES/view',
        'BAD':           'https://drive.google.com/file/d/1PgNc8RWvhFu46IMJrxFHKUch1d6HcUWM/view',
        'BERGHAIN':      'https://drive.google.com/file/d/1HoecwsFtSMfrZtMjSK8Jmc9G7DP2EgJu8/view',
        'Brooklyn 1964': 'https://drive.google.com/file/d/1yYTSXbJI3J5hrv_ZrnieFF5VSjcQQGVE/view',
        'CARNAGE':       'https://drive.google.com/file/d/1IlVfl7t-f3XWXo4vmZM_90mZR3BNRkz8/view',
        'Distancia':     'https://drive.google.com/file/d/1bB34UQt3sfPWQ2mfSUVhMPkOyZupcuNe/view',
        'ECLIPSE':       'https://drive.google.com/file/d/1t1kZLHb9rbWGX-4YMRslvRw8OKstVFCO/view',
        'Elevation':     'https://drive.google.com/file/d/1GlgT0cPwyF7uhBHOTiRC26a0-5T5c6Pu/view',
        'EMPIRE':        'https://drive.google.com/file/d/1MDqTqQjCD50jETK-TsxK2KYKoyMLEva8/view',
        'Illusion':      'https://drive.google.com/file/d/13cwArN1QFNnYtjHdHbSa9zRox062FXUC/view',
        'Sabah':         'https://drive.google.com/file/d/1OIw_IZwhKmOKb46VMflP-JJin5kbzzFJ/view',
        'LARME':         'https://drive.google.com/file/d/17DEhRDFJrouMw6ONLy5Csx7maRHglXqr/view',
        'MEMORIES':      'https://drive.google.com/file/d/1q37XZVVPBuCJkqIOxrICOtaeHisbIbe6/view',
        'MIRAGE':        'https://drive.google.com/file/d/15cUNIMxH1KMhXmPlv5ZYh7p51tg63IQC/view',
        'Ombre':         'https://drive.google.com/file/d/1OSJ2OdTXg3jdypAjb2p8CYJya0DTGnRM/view',
        'Renaissance':   'https://drive.google.com/file/d/1r1F9RzegirGh883ppl7PQLrP4PIW7-Qf/view',
        'SHAKE':         'https://drive.google.com/file/d/1sVxYyG-YH5OY-FX3NVSlVBfVKAP0BNQU/view',
        'Solitude':      'https://drive.google.com/file/d/1RqGyCD8o2tlG_5tESRk-O1wjgqy29Q7O/view',
        'SOLUNA':        'https://drive.google.com/file/d/1e1jun_ZlSPPDvzAKA6GIve3AYm27No9v/view',
        'Sunset':        'https://drive.google.com/file/d/1vQwqf3GYVC1J1GCM-KV_F4sEkD2hDC_P/view',
        'TRUTH':         'https://drive.google.com/file/d/1LfiwN3Jm4qB1VEB9JNBUvX6c1LijJPlq/view',
        'ZURA':          'https://drive.google.com/file/d/16RReB9RJfMjuoBqXdfmQrubnRSP32OLv/view',
    };

    const t = {
        fr: {
            backLabel: 'RETOUR AU CATALOGUE',
            formTitle: 'TES INFORMATIONS',
            labelName: 'TON PRÉNOM',
            labelEmail: 'TON EMAIL',
            emailNote: '📧 Tes beats seront envoyés à cette adresse après vérification.',
            payTitle: 'PAIEMENT SÉCURISÉ',
            recapTitle: 'RÉCAP DE COMMANDE',
            promoTxt: '✅ OFFRE 2+1 APPLIQUÉE — Le 3ème beat est offert !',
            emptyMsg: 'TON PANIER EST VIDE',
            successTitle: '⏳ VÉRIFICATION EN COURS',
            successMsg: 'Ton numéro de transaction a bien été reçu.\n\nKaiju va vérifier ton paiement sur PayPal.\n\nDès que c\'est confirmé, tu recevras tes beats par email ! 📧\n\nGénéralement moins de 30 minutes.',
            successBtn: 'RETOUR AU CATALOGUE',
            errorName: 'Entre ton prénom pour continuer.',
            errorEmail: 'Entre un email valide pour recevoir tes beats.',
            errorTx: '⚠️ Entre ton numéro de transaction PayPal.',
            payBtn: 'PAYER',
            txLabel: '✅ PAIEMENT EFFECTUÉ ?',
            txDesc: 'Copie ton numéro de transaction PayPal (ex: 4XY12345AB678) et colle-le ci-dessous.',
            txPlaceholder: 'Numéro de transaction PayPal...',
            confirmBtn: '✅ CONFIRMER MA COMMANDE',
            pendingMsg: '⏳ Ton paiement est en attente de vérification. Kaiju te contactera très vite !',
        },
        en: {
            backLabel: 'BACK TO CATALOG',
            formTitle: 'YOUR INFORMATION',
            labelName: 'YOUR FIRST NAME',
            labelEmail: 'YOUR EMAIL',
            emailNote: '📧 Your beats will be sent to this address after verification.',
            payTitle: 'SECURE PAYMENT',
            recapTitle: 'ORDER SUMMARY',
            promoTxt: '✅ 2+1 DEAL APPLIED — Your 3rd beat is on me!',
            emptyMsg: 'YOUR CART IS EMPTY',
            successTitle: '⏳ VERIFICATION IN PROGRESS',
            successMsg: 'Your transaction ID has been received.\n\nKaiju will verify your payment on PayPal.\n\nOnce confirmed, your beats will be sent to your email! 📧\n\nUsually within 30 minutes.',
            successBtn: 'BACK TO CATALOG',
            errorName: 'Please enter your name to continue.',
            errorEmail: 'Please enter a valid email to receive your beats.',
            errorTx: '⚠️ Please enter your PayPal transaction ID.',
            payBtn: 'PAY',
            txLabel: '✅ PAYMENT DONE?',
            txDesc: 'Copy your PayPal transaction ID (e.g. 4XY12345AB678) and paste it below.',
            txPlaceholder: 'PayPal transaction ID...',
            confirmBtn: '✅ CONFIRM MY ORDER',
            pendingMsg: '⏳ Your payment is pending verification. Kaiju will contact you soon!',
        }
    };

    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

    const lang = localStorage.getItem('kaijuLang') || 'fr';
    const tx = t[lang];
    const cart = JSON.parse(localStorage.getItem('kaijuCart') || '[]');

    // Apply translations
    document.getElementById('backLabel').textContent  = tx.backLabel;
    document.getElementById('formTitle').textContent  = tx.formTitle;
    document.getElementById('labelName').textContent  = tx.labelName;
    document.getElementById('labelEmail').textContent = tx.labelEmail;
    document.getElementById('emailNote').textContent  = tx.emailNote;
    document.getElementById('payTitle').textContent   = tx.payTitle;
    document.getElementById('recapTitle').textContent = tx.recapTitle;
    document.getElementById('emptyMsg').textContent   = tx.emptyMsg;
    document.getElementById('successTitle').textContent = tx.successTitle;
    document.getElementById('successMsg').style.whiteSpace = 'pre-line';
    document.getElementById('successMsg').textContent = tx.successMsg;
    document.getElementById('successBtn').textContent = tx.successBtn;

    if (cart.length === 0) {
        document.getElementById('checkoutWrapper').style.display = 'none';
        document.getElementById('emptyCart').style.display = 'block';
    } else {
        renderRecap();
        renderPayment();
    }

    function calcTotal(items) {
        let total = 0;
        for (let i = 1; i <= items.length; i++) { if (i % 3 !== 0) total += 39.99; }
        return parseFloat(total.toFixed(2));
    }

    function renderRecap() {
        const total = calcTotal(cart);
        let html = '';
        cart.forEach((b, i) => {
            const isFree = (i + 1) % 3 === 0;
            html += `
                <div class="recap-item">
                    <img class="recap-cover" src="${b.cover}" alt="${b.title}" onerror="this.style.display='none'">
                    <div class="recap-info">
                        <h4>${b.title}</h4>
                        <small>${b.genre ? b.genre.toUpperCase() : 'BEAT'} • PROD BY KAIJU</small>
                    </div>
                    ${isFree ? `<span class="recap-free">OFFERT 🎁</span>` : `<span class="recap-price">39.99€</span>`}
                </div>`;
        });
        document.getElementById('recapItems').innerHTML = html;
        if (cart.length >= 3) {
            document.getElementById('promoLine').innerHTML = `<div class="promo-line">${tx.promoTxt}</div>`;
        }
        document.getElementById('recapTotal').textContent = total + '€';
    }

    function renderPayment() {
        const total = calcTotal(cart);
        document.getElementById('payContainer').innerHTML = `
            <button class="paypalme-btn" id="payBtn">
                <img src="https://www.paypalobjects.com/webstatic/mktg/Logo/pp-logo-100px.png" alt="PayPal" style="height:20px;">
                <span>${tx.payBtn} ${total}€ — PayPal.Me</span>
            </button>
            <p style="font-size:0.62rem; color:#444; font-family:'Space Mono',monospace; text-align:center; margin-top:10px;">
                🔒 ${lang === 'fr' ? 'Paiement sécurisé via PayPal' : 'Secure payment via PayPal'}
            </p>

            <div class="tx-box" id="txBox">
                <p class="tx-label">${tx.txLabel}</p>
                <p class="tx-desc">${tx.txDesc}</p>
                <input type="text" class="tx-input" id="txInput" placeholder="${tx.txPlaceholder}">
                <p class="tx-error" id="txError">${tx.errorTx}</p>
                <button class="confirm-btn" id="confirmBtn">
                    <i class="fas fa-check-circle"></i> ${tx.confirmBtn}
                </button>
            </div>

            <div class="pending-box" id="pendingBox">
                <p>${tx.pendingMsg}</p>
            </div>
        `;

        // Step 1 — Open PayPal
        document.getElementById('payBtn').onclick = () => {
            const name  = document.getElementById('custName').value.trim();
            const email = document.getElementById('custEmail').value.trim();
            if (!name) { alert(tx.errorName); return; }
            if (!email || !email.includes('@')) { alert(tx.errorEmail); return; }
            window.open(`${PAYPALME_LINK}/${total}EUR`, '_blank');
            setTimeout(() => {
                document.getElementById('txBox').style.display = 'block';
                document.getElementById('txInput').focus();
            }, 1500);
        };

        // Step 2 — Confirm transaction + notify Kaiju on WhatsApp
        document.getElementById('confirmBtn').onclick = () => {
            const txId  = document.getElementById('txInput').value.trim();
            const name  = document.getElementById('custName').value.trim();
            const email = document.getElementById('custEmail').value.trim();

            if (!txId || txId.length < 4) {
                document.getElementById('txError').style.display = 'block';
                return;
            }
            document.getElementById('txError').style.display = 'none';

            // Build download links for the magic link
            const downloadLinks = cart.map((b, i) => {
                const isFree = (i + 1) % 3 === 0;
                const link = driveLinks[b.title] || '#';
                const tag = isFree ? (lang === 'fr' ? ' 🎁 OFFERT' : ' 🎁 FREE') : '';
                return `🎵 ${b.title}${tag}: ${link}`;
            }).join('\n');

            const beatList = cart.map(b => b.title).join(', ');

            // Build SHORT magic link — only names, send-beats.html resolves Drive links
            const shortData = encodeURIComponent(JSON.stringify({
                n: name,
                e: email,
                b: cart.map(b => b.title).join(','),
                t: total,
                l: lang
            }));
            const magicLink = `https://callmekaiju25-afk.github.io/Kaiju-beats-store/send-beats.html?d=${shortData}`;

            // WhatsApp message to Kaiju
            const waMsg = encodeURIComponent(
                `💰 NOUVELLE COMMANDE — KAIJU BEATS\n` +
                `👤 Client: ${name}\n` +
                `📧 Email: ${email}\n` +
                `🎵 Beats: ${beatList}\n` +
                `💵 Total: ${total}€\n` +
                `🧾 Transaction PayPal: ${txId}\n\n` +
                `✅ Vérifie PayPal puis envoie les beats :\n` +
                `${magicLink}`
            );

            window.open(`https://wa.me/${KAIJU_WA}?text=${waMsg}`, '_blank');

            // Disable button and show pending
            document.getElementById('confirmBtn').disabled = true;
            document.getElementById('confirmBtn').style.opacity = '0.5';
            document.getElementById('pendingBox').style.display = 'block';

            // Clear cart and show success
            localStorage.removeItem('kaijuCart');
            setTimeout(() => {
                document.getElementById('successOverlay').classList.add('show');
            }, 2000);
        };
    }
    </script>
</body>
</html>
