<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIJU BEATS | Checkout</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=22.0">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        @keyframes fadeInUp { from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)} }
        @keyframes shimmer { 0%{left:-100%}100%{left:200%} }

        .checkout-page { min-height:100vh; padding:110px 20px 100px; background:var(--cream); }
        .checkout-wrapper { max-width:960px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:26px; }

        .checkout-card {
            background:white; border:1px solid var(--border);
            border-radius:18px; padding:30px; position:relative;
            box-shadow:var(--shadow); overflow:hidden; transition:border-color 0.3s,box-shadow 0.3s;
        }
        .checkout-card::before { content:''; position:absolute; top:0; left:10%; right:10%; height:1px; background:linear-gradient(90deg,transparent,var(--jade),transparent); }
        .checkout-card:hover { border-color:var(--border-hi); box-shadow:var(--shadow-hover); }
        .checkout-card h2 { font-family:'Orbitron',sans-serif; font-size:0.8rem; font-weight:900; letter-spacing:3px; color:var(--jade); margin-bottom:24px; display:flex; align-items:center; gap:10px; }

        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:2.5px; color:var(--text-soft); margin-bottom:8px; text-transform:uppercase; }
        .form-group input { width:100%; background:var(--cream); border:1px solid var(--border); border-radius:10px; padding:14px 16px; color:var(--text-main); font-family:'Space Mono',monospace; font-size:0.82rem; outline:none; transition:all 0.3s; box-sizing:border-box; }
        .form-group input:focus { border-color:var(--border-hi); box-shadow:0 0 0 3px rgba(61,122,82,0.08); background:white; }
        .form-group input::placeholder { color:rgba(61,122,82,0.3); }

        .checkout-right { display:flex; flex-direction:column; gap:22px; }
        .recap-item { display:flex; align-items:center; gap:13px; padding:13px 0; border-bottom:1px solid var(--border); transition:all 0.2s; }
        .recap-item:last-child { border-bottom:none; }
        .recap-item:hover { padding-left:5px; }
        .recap-cover { width:48px; height:48px; border-radius:10px; object-fit:cover; flex-shrink:0; border:1px solid var(--border); }
        .recap-info { flex:1; }
        .recap-info h4 { font-family:'Orbitron',sans-serif; font-size:0.73rem; font-weight:700; color:var(--text-main); margin-bottom:3px; }
        .recap-info small { font-size:0.6rem; color:var(--text-soft); letter-spacing:1px; }
        .recap-price { font-family:'Orbitron',sans-serif; font-size:0.82rem; font-weight:700; color:var(--jade); white-space:nowrap; }
        .recap-free { color:var(--jade); font-size:0.68rem; font-weight:700; letter-spacing:1px; }

        .total-section { border-top:1px solid var(--border-hi); padding-top:18px; margin-top:8px; }
        .total-line { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .total-line.main { margin-top:12px; }
        .total-line.main span:first-child { font-family:'Orbitron',sans-serif; font-size:0.95rem; font-weight:900; color:var(--text-main); letter-spacing:3px; }
        .total-line.main span:last-child { font-family:'Orbitron',sans-serif; font-size:1.3rem; font-weight:900; color:var(--jade); }

        .promo-line { background:rgba(61,122,82,0.06); border:1px solid var(--border); border-radius:10px; padding:11px 14px; font-size:0.68rem; color:var(--jade); text-align:center; letter-spacing:1px; margin-bottom:10px; position:relative; overflow:hidden; }
        .promo-line::after { content:''; position:absolute; top:0; left:-100%; width:40%; height:100%; background:linear-gradient(90deg,transparent,rgba(61,122,82,0.1),transparent); animation:shimmer 3s ease-in-out infinite; }

        .back-btn { display:inline-flex; align-items:center; gap:8px; color:var(--text-soft); font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:2px; text-decoration:none; margin-bottom:30px; transition:all 0.3s; }
        .back-btn:hover { color:var(--jade); gap:12px; }
        .back-btn i { transition:transform 0.3s; }
        .back-btn:hover i { transform:translateX(-3px); }

        .empty-cart { text-align:center; padding:70px 20px; }
        .empty-cart i { font-size:3rem; color:rgba(61,122,82,0.2); margin-bottom:18px; display:block; }
        .empty-cart h2 { font-family:'Orbitron',sans-serif; font-size:0.95rem; color:var(--text-soft); letter-spacing:3px; }

        .success-overlay { display:none; position:fixed; inset:0; background:rgba(26,46,31,0.55); z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(14px); }
        .success-overlay.show { display:flex; }
        .success-card { background:var(--cream); border:1px solid var(--border-hi); border-radius:22px; padding:46px 38px; text-align:center; max-width:460px; width:100%; animation:fadeInUp 0.5s ease; box-shadow:0 30px 70px rgba(26,46,31,0.2); }
        .success-icon { font-size:3.5rem; margin-bottom:18px; animation:bounce 1.5s ease infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)} }
        .success-card h2 { font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:900; letter-spacing:3px; color:var(--jade); margin-bottom:12px; }
        .success-card p { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--text-mid); line-height:1.9; white-space:pre-line; }
        .success-card .go-back { display:inline-block; margin-top:22px; padding:13px 30px; background:var(--jade); color:var(--cream); font-family:'Orbitron',sans-serif; font-weight:700; font-size:0.76rem; letter-spacing:2px; border-radius:10px; text-decoration:none; transition:all 0.3s; box-shadow:0 4px 16px rgba(61,122,82,0.3); }
        .success-card .go-back:hover { background:var(--ink-mid); transform:translateY(-2px); }

        .paypalme-btn { width:100%; padding:16px; background:#0e7490; border:none; border-radius:12px; color:white; font-family:'Orbitron',sans-serif; font-weight:700; font-size:0.76rem; letter-spacing:2px; cursor:none; transition:all 0.3s; display:flex; align-items:center; justify-content:center; gap:10px; }
        .paypalme-btn:hover { background:#0c6480; transform:translateY(-2px); box-shadow:0 6px 20px rgba(14,116,144,0.3); }

        .confirm-btn { width:100%; padding:16px; background:var(--jade); border:none; border-radius:12px; color:var(--cream); font-family:'Orbitron',sans-serif; font-weight:900; font-size:0.78rem; letter-spacing:2px; cursor:none; transition:all 0.3s; display:flex; align-items:center; justify-content:center; gap:10px; margin-top:12px; }
        .confirm-btn:hover { background:var(--ink-mid); box-shadow:0 6px 20px rgba(61,122,82,0.35); transform:translateY(-2px); }

        .tx-box { background:rgba(61,122,82,0.04); border:1px solid var(--border); border-radius:14px; padding:20px; margin-top:16px; display:none; animation:fadeInUp 0.4s ease; }
        .tx-label { font-family:'Orbitron',sans-serif; font-size:0.68rem; color:var(--jade); letter-spacing:2px; margin-bottom:8px; }
        .tx-desc { font-family:'Space Mono',monospace; font-size:0.65rem; color:var(--text-soft); line-height:1.8; margin-bottom:14px; }
        .tx-input { width:100%; background:var(--cream); border:1px solid var(--border-hi); border-radius:10px; padding:13px 16px; color:var(--text-main); font-family:'Space Mono',monospace; font-size:0.8rem; outline:none; box-sizing:border-box; margin-bottom:4px; transition:all 0.3s; }
        .tx-input:focus { border-color:var(--jade); box-shadow:0 0 0 3px rgba(61,122,82,0.08); }
        .tx-error { font-size:0.62rem; color:#dc5050; font-family:'Space Mono',monospace; margin:6px 0 0; display:none; }
        .pending-box { background:rgba(234,179,8,0.06); border:1px solid rgba(234,179,8,0.2); border-radius:12px; padding:14px; margin-top:12px; display:none; animation:fadeInUp 0.4s ease; }
        .pending-box p { font-family:'Space Mono',monospace; font-size:0.66rem; color:#a16207; line-height:1.8; }

        @media (max-width:768px) { .checkout-wrapper{grid-template-columns:1fr} .checkout-right{order:-1} }
        @media (max-width:480px) { .checkout-card{padding:20px} }
    </style>
</head>

        'ECLIPSE':       'https://drive.google.com/file/d/1t1kZLHb9rbWGX-4YMRslvRw8OKstVFCO/view',

        'Ombre':         'https://drive.google.com/file/d/1OSJ2OdTXg3jdypAjb2p8CYJya0DTGnRM/view',
        'Renaissance':   'https://drive.google.com/file/d/1r1F9RzegirGh883ppl7PQLrP4PIW7-Qf/view',
        'SHAKE':         'https://drive.google.com/file/d/1sVxYyG-YH5OY-FX3NVSlVBfVKAP0BNQU/view',

        'SOLUNA':        'https://drive.google.com/file/d/1e1jun_ZlSPPDvzAKA6GIve3AYm27No9v/view',
        'Sunset':        'https://drive.google.com/file/d/1vQwqf3GYVC1J1GCM-KV_F4sEkD2hDC_P/view',
        'TRUTH':         'https://drive.google.com/file/d/1LfiwN3Jm4qB1VEB9JNBUvX6c1LijJPlq/view',
        'ZURA':          'https://drive.google.com/file/d/16RReB9RJfMjuoBqXdfmQrubnRSP32OLv/view',
    };

    const t = {
        fr: {
            backLabel: 'RETOUR AU CATALOGUE',
            formTitle: 'TES INFORMATIONS',
            labelName: 'TON PRÉNOM',
            labelEmail: 'TON EMAIL',
            emailNote: '📧 Tes beats seront envoyés à cette adresse après vérification.',
            payTitle: 'PAIEMENT SÉCURISÉ',
            recapTitle: 'RÉCAP DE COMMANDE',
            promoTxt: '✅ OFFRE 2+1 APPLIQUÉE — Le 3ème beat est offert !',
            emptyMsg: 'TON PANIER EST VIDE',
            successTitle: '⏳ VÉRIFICATION EN COURS',
            successMsg: 'Ton numéro de transaction a bien été reçu.\n\nKaiju va vérifier ton paiement sur PayPal.\n\nDès que c\'est confirmé, tu recevras tes beats par email ! 📧\n\nGénéralement moins de 30 minutes.',
            successBtn: 'RETOUR AU CATALOGUE',
            errorName: 'Entre ton prénom pour continuer.',
            errorEmail: 'Entre un email valide pour recevoir tes beats.',
            errorTx: '⚠️ Entre ton numéro de transaction PayPal.',
            payBtn: 'PAYER',
            txLabel: '✅ PAIEMENT EFFECTUÉ ?',
            txDesc: 'Copie ton numéro de transaction PayPal (ex: 4XY12345AB678) et colle-le ci-dessous.',
            txPlaceholder: 'Numéro de transaction PayPal...',
            confirmBtn: '✅ CONFIRMER MA COMMANDE',
            pendingMsg: '⏳ Ton paiement est en attente de vérification. Kaiju te contactera très vite !',
        },
        en: {
            backLabel: 'BACK TO CATALOG',
            formTitle: 'YOUR INFORMATION',
            labelName: 'YOUR FIRST NAME',
            labelEmail: 'YOUR EMAIL',
            emailNote: '📧 Your beats will be sent to this address after verification.',
            payTitle: 'SECURE PAYMENT',
            recapTitle: 'ORDER SUMMARY',
            promoTxt: '✅ 2+1 DEAL APPLIED — Your 3rd beat is on me!',
            emptyMsg: 'YOUR CART IS EMPTY',
            successTitle: '⏳ VERIFICATION IN PROGRESS',
            successMsg: 'Your transaction ID has been received.\n\nKaiju will verify your payment on PayPal.\n\nOnce confirmed, your beats will be sent to your email! 📧\n\nUsually within 30 minutes.',
            successBtn: 'BACK TO CATALOG',
            errorName: 'Please enter your name to continue.',
            errorEmail: 'Please enter a valid email to receive your beats.',
            errorTx: '⚠️ Please enter your PayPal transaction ID.',
            payBtn: 'PAY',

            txPlaceholder: 'PayPal transaction ID...',
            confirmBtn: '✅ CONFIRM MY ORDER',
            pendingMsg: '⏳ Your payment is pending verification. Kaiju will contact you soon!',

    };

    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

    const lang = localStorage.getItem('kaijuLang') || 'fr';
    const tx = t[lang];
    const cart = JSON.parse(localStorage.getItem('kaijuCart') || '[]');

    // Apply translations
    document.getElementById('backLabel').textContent  = tx.backLabel;

    document.getElementById('successMsg').textContent = tx.successMsg;
    document.getElementById('successBtn').textContent = tx.successBtn;

        document.getElementById('checkoutWrapper').style.display = 'none';
        document.getElementById('emptyCart').style.display = 'block';
    } else {
        renderRecap();
        renderPayment();
    }

    function calcTotal(items) {
        let total = 0;
        for (let i = 1; i <= items.length; i++) { if (i % 3 !== 0) total += 39.99; }
        return parseFloat(total.toFixed(2));
    }

    function renderRecap() {
        const total = calcTotal(cart);
        let html = '';
        cart.forEach((b, i) => {
            const isFree = (i + 1) % 3 === 0;
            html += `
                <div class="recap-item">
                    <img class="recap-cover" src="${b.cover}" alt="${b.title}" onerror="this.style.display='none'">
                    <div class="recap-info">
                        <h4>${b.title}</h4>
                        <small>${b.genre ? b.genre.toUpperCase() : 'BEAT'} • PROD BY KAIJU</small>
                    </div>
                    ${isFree ? `<span class="recap-free">OFFERT 🎁</span>` : `<span class="recap-price">39.99€</span>`}
                </div>`;
        });
        document.getElementById('recapItems').innerHTML = html;
        if (cart.length >= 3) {
            document.getElementById('promoLine').innerHTML = `<div class="promo-line">${tx.promoTxt}</div>`;
        }
        document.getElementById('recapTotal').textContent = total + '€';
    }

    function renderPayment() {
        const total = calcTotal(cart);
        document.getElementById('payContainer').innerHTML = `
            <button class="paypalme-btn" id="payBtn">
                <img src="https://www.paypalobjects.com/webstatic/mktg/Logo/pp-logo-100px.png" alt="PayPal" style="height:20px;">

            </button>
            <p style="font-size:0.62rem; color:#444; font-family:'Space Mono',monospace; text-align:center; margin-top:10px;">
                🔒 ${lang === 'fr' ? 'Paiement sécurisé via PayPal' : 'Secure payment via PayPal'}
            </p>

            <div class="tx-box" id="txBox">
                <p class="tx-label">${tx.txLabel}</p>
                <p class="tx-desc">${tx.txDesc}</p>
                <input type="text" class="tx-input" id="txInput" placeholder="${tx.txPlaceholder}">
                <p class="tx-error" id="txError">${tx.errorTx}</p>
                <button class="confirm-btn" id="confirmBtn">
                    <i class="fas fa-check-circle"></i> ${tx.confirmBtn}
                </button>
            </div>

            <div class="pending-box" id="pendingBox">
                <p>${tx.pendingMsg}</p>
            </div>
        `;

        // Step 1 — Open PayPal
        document.getElementById('payBtn').onclick = () => {
            const name  = document.getElementById('custName').value.trim();
            const email = document.getElementById('custEmail').value.trim();
            if (!name) { alert(tx.errorName); return; }
            if (!email || !email.includes('@')) { alert(tx.errorEmail); return; }
            window.open(`${PAYPALME_LINK}/${total}EUR`, '_blank');
            setTimeout(() => {
                document.getElementById('txBox').style.display = 'block';
                document.getElementById('txInput').focus();
            }, 1500);
        };

        // Step 2 — Confirm transaction + notify Kaiju on WhatsApp
        document.getElementById('confirmBtn').onclick = () => {
            const txId  = document.getElementById('txInput').value.trim();
            const name  = document.getElementById('custName').value.trim();
            const email = document.getElementById('custEmail').value.trim();

            if (!txId || txId.length < 4) {
                document.getElementById('txError').style.display = 'block';
                return;
            }
            document.getElementById('txError').style.display = 'none';

            // Build download links for the magic link
            const downloadLinks = cart.map((b, i) => {
                const isFree = (i + 1) % 3 === 0;
                const link = driveLinks[b.title] || '#';
                const tag = isFree ? (lang === 'fr' ? ' 🎁 OFFERT' : ' 🎁 FREE') : '';
                return `🎵 ${b.title}${tag}: ${link}`;
            }).join('\n');

            const beatList = cart.map(b => b.title).join(', ');

            // Build SHORT magic link — only names, send-beats.html resolves Drive links
            const shortData = encodeURIComponent(JSON.stringify({
                n: name,
                e: email,
                b: cart.map(b => b.title).join(','),
                t: total,
                l: lang
            }));
            const magicLink = `https://callmekaiju25-afk.github.io/Kaiju-beats-store/send-beats.html?d=${shortData}`;

            // WhatsApp message to Kaiju
            const waMsg = encodeURIComponent(
                `💰 NOUVELLE COMMANDE — KAIJU BEATS\n` +
                `👤 Client: ${name}\n` +
                `📧 Email: ${email}\n` +
                `🎵 Beats: ${beatList}\n` +
                `💵 Total: ${total}€\n` +
                `🧾 Transaction PayPal: ${txId}\n\n` +
                `✅ Vérifie PayPal puis envoie les beats :\n` +
                `${magicLink}`
            );

            window.open(`https://wa.me/${KAIJU_WA}?text=${waMsg}`, '_blank');

            // Disable button and show pending
            document.getElementById('confirmBtn').disabled = true;
            document.getElementById('confirmBtn').style.opacity = '0.5';
            document.getElementById('pendingBox').style.display = 'block';

            // Clear cart and show success
            localStorage.removeItem('kaijuCart');
            setTimeout(() => {
                document.getElementById('successOverlay').classList.add('show');
            }, 2000);
        };
    }
    // Curseur 8-bit
    const cur8 = document.getElementById('cursor8bit');
    const trail = document.getElementById('cursorTrail');
    if (cur8) {
        let mx = 0, my = 0, tx = 0, ty = 0;
        document.addEventListener('mousemove', (e) => {
            mx = e.clientX; my = e.clientY;
            cur8.style.left = mx + 'px';
            cur8.style.top = my + 'px';
        });
        function trailAnim() {
            tx += (mx - tx) * 0.15;
            ty += (my - ty) * 0.15;
            if (trail) { trail.style.left = tx + 'px'; trail.style.top = ty + 'px'; }
            requestAnimationFrame(trailAnim);
        }
        trailAnim();
    }

    // Scroll reveal
    document.querySelectorAll('.checkout-card, .checkout-left, .checkout-right').forEach((el, i) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(30px)';
        el.style.transition = `opacity 0.6s ease ${i * 0.1}s, transform 0.6s ease ${i * 0.1}s`;
        setTimeout(() => {
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
        }, 100 + i * 100);
    });
    </script>
</body>
</html>
